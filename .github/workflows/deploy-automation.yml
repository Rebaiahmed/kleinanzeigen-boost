name: Deploy Automation Worker to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'automation/**'
      - '.github/workflows/deploy-automation.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy automation worker over SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/kleinanzeigen-boost
            git fetch origin main
            git reset --hard origin/main
            cd automation
            npm ci
            # Ensure the Playwright browser is present (no-op if already installed)
            npx playwright install --with-deps chromium || true
            npm run build
            pm2 restart anzeigenboost-automation --update-env || pm2 start dist/index.js --name anzeigenboost-automation
            pm2 save

            # ── Post-deploy health check ──────────────────────────────────────
            # A "successful" deploy means nothing if the worker crash-loops (e.g.
            # a port conflict) or never loaded its .env. Probe the public /health
            # endpoint and fail the workflow if it's down or running on the dev
            # secret (which means automation/.env wasn't read → 403 to the backend).
            echo "▶ Health check on :3001/health…"
            RESP=""
            for i in 1 2 3 4 5 6; do
              sleep 2
              RESP=$(curl -s -m 5 http://127.0.0.1:3001/health || true)
              [ -n "$RESP" ] && break
            done
            echo "Health: ${RESP:-<none>}"
            if [ -z "$RESP" ]; then
              echo "❌ Worker not responding on :3001 (crashed or not listening)"
              pm2 logs anzeigenboost-automation --lines 40 --nostream || true
              exit 1
            fi
            if echo "$RESP" | grep -q '"secret":"DEFAULT_DEV"'; then
              echo "❌ Worker is using the dev fallback secret — automation/.env not loaded"
              exit 1
            fi
            if ! echo "$RESP" | grep -q '"status":"ok"'; then
              echo "❌ Unexpected health response"; exit 1
            fi
            echo "✅ Automation worker deployed & healthy (online, .env loaded)."
