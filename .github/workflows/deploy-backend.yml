name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {} # allow manual run from the Actions tab

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "▶ Pulling latest code…"
            cd /root/kleinanzeigen-boost
            git fetch origin main
            git reset --hard origin/main
            cd backend
            echo "▶ Installing dependencies…"
            npm ci
            echo "▶ Building…"
            rm -rf dist
            npm run build
            echo "▶ Restarting PM2 process…"
            pm2 restart anzeigenboost-api --update-env || pm2 start dist/main.js --name anzeigenboost-api
            pm2 save
            echo "✅ Deploy complete."

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -fsS "http://${{ secrets.VPS_HOST }}:3000/api/health"; then
              echo "" && echo "✅ Backend healthy."; exit 0
            fi
            echo "Attempt $i failed, retrying in 5s…"; sleep 5
          done
          echo "❌ Health check failed after deploy."; exit 1
