name: Build & Deploy Chrome Extension

on:
  # Manual only for now. Auto-publish needs the Chrome Web Store API secrets set in
  # the repo (CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN,
  # CHROME_EXTENSION_ID). Until they're configured, a push would bump the version
  # and tag, then fail at the store upload. Once the secrets exist, re-add:
  #   push: { branches: [main], paths: ['extension/**', '.github/workflows/deploy-extension.yml'] }
  workflow_dispatch: {}

# Prevent concurrent runs — only one deploy at a time
concurrency:
  group: extension-deploy
  cancel-in-progress: false

jobs:
  # ── Job 1: version bump, build, package, upload a draft to the Chrome Web
  # Store, cut a GitHub Release. Everything here is safe/reversible — "upload"
  # only replaces the store's pending draft, it does NOT go live to users.
  build-and-upload:
    name: Version, Build & Upload to Chrome Web Store
    runs-on: ubuntu-latest
    # Don't re-run on the version-bump commit this workflow pushes back
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write   # needed to push version bump commit + create release
      actions: read     # needed by notify-slack-failure to look up the failed step

    outputs:
      new_version: ${{ steps.version.outputs.new }}
      zip_path: ${{ env.ZIP_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for changelog and tags

      # ── 1. Determine version bump ─────────────────────────────────────────
      - name: Determine bump type
        id: bump
        # Pass the commit message via env, NOT direct ${{ }} interpolation, so
        # backticks / $(...) in a message can't be executed by the shell.
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$MSG" | grep -q '#major'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -q '#minor'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      # ── 2. Bump version in manifest.json ─────────────────────────────────
      - name: Bump manifest version
        id: version
        run: |
          MANIFEST="extension/public/manifest.json"
          MANIFEST_V=$(jq -r '.version' "$MANIFEST")
          # Base the bump on whichever is higher: the manifest version or the latest
          # published tag. Prevents "tag already exists" when they drift out of sync.
          TAG_V=$(git tag --list 'extension-v*' --sort=version:refname | tail -1 | sed 's/^extension-v//')
          CURRENT=$(printf '%s\n%s\n' "$MANIFEST_V" "${TAG_V:-0.0.0}" | sort -V | tail -1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          TYPE="${{ steps.bump.outputs.type }}"
          if [ "$TYPE" = "major" ]; then
            NEW="$((MAJOR + 1)).0.0"
          elif [ "$TYPE" = "minor" ]; then
            NEW="${MAJOR}.$((MINOR + 1)).0"
          else
            NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          jq --arg v "$NEW" '.version = $v' "$MANIFEST" > /tmp/manifest.json
          mv /tmp/manifest.json "$MANIFEST"

          echo "old=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW"     >> $GITHUB_OUTPUT
          echo "tag=extension-v${NEW}" >> $GITHUB_OUTPUT

      # ── 3. Build extension ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build
        run: npm run build
        working-directory: extension

      # ── 4. Package as zip ────────────────────────────────────────────────
      - name: Create extension zip
        run: |
          cd extension/dist
          zip -r "../../anzeigenboost-extension-v${{ steps.version.outputs.new }}.zip" .
          cd ../..
          echo "ZIP_PATH=anzeigenboost-extension-v${{ steps.version.outputs.new }}.zip" >> $GITHUB_ENV

      # ── 5. Generate changelog ─────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git tag --list 'extension-v*' --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Commits that touched the extension directory
          LOG=$(git log "$RANGE" --pretty=format:"- %s (%h)" -- extension/ | head -50)
          if [ -z "$LOG" ]; then
            LOG="- Internal build bump"
          fi

          # Write to file to preserve newlines across steps
          {
            echo "## What's changed in v${{ steps.version.outputs.new }}"
            echo ""
            echo "$LOG"
          } > /tmp/changelog.md

          echo "path=/tmp/changelog.md" >> $GITHUB_OUTPUT

      # ── 6. Commit version bump & push ─────────────────────────────────────
      # main can move between checkout and push (another PR merging mid-run),
      # which makes a plain `git push` fail non-fast-forward. Commit locally
      # first, then rebase onto the latest origin/main and retry the push a
      # few times — tagging happens AFTER each rebase (not before), since
      # rebase rewrites the commit hash and a pre-rebase tag would end up
      # pointing at an orphaned commit.
      - name: Commit & tag version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/public/manifest.json
          git commit -m "chore(extension): bump version ${{ steps.version.outputs.old }} → ${{ steps.version.outputs.new }} [skip ci]"

          MAX_ATTEMPTS=5
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "▶ Attempt $i/$MAX_ATTEMPTS — syncing with origin/main…"
            git fetch origin main

            if ! git rebase origin/main; then
              echo "❌ Rebase hit a real conflict (not just a race) — aborting. Likely another run touched extension/public/manifest.json concurrently."
              git rebase --abort
              exit 1
            fi

            # -f: safe to overwrite on retry — this tag was only ever created
            # locally in this same run, never successfully pushed yet.
            git tag -f "${{ steps.version.outputs.tag }}"

            if git push origin main && git push origin "${{ steps.version.outputs.tag }}" --force; then
              echo "✅ Pushed commit + tag successfully."
              exit 0
            fi

            echo "⚠️  Push rejected — origin/main moved again mid-push. Retrying…"
            sleep $((RANDOM % 5 + 1))
          done

          echo "❌ Push failed after $MAX_ATTEMPTS attempts — origin/main kept moving faster than we could rebase."
          exit 1

      # ── 7. Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Extension v${{ steps.version.outputs.new }}"
          body_path: ${{ steps.changelog.outputs.path }}
          files: ${{ env.ZIP_PATH }}
          draft: false
          prerelease: false

      # ── 8. Upload draft to Chrome Web Store ────────────────────────────────
      # This only replaces the item's PENDING draft in the Developer Dashboard —
      # it is not visible to users until the separate "publish" job runs.
      - name: Get Chrome Web Store access token
        id: cws_token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to get access token: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Upload zip to Chrome Web Store
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ steps.cws_token.outputs.token }}" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T "${{ env.ZIP_PATH }}" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | jq -r '.uploadState')
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "Upload failed with status: $STATUS"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### 📦 Extension v${{ steps.version.outputs.new }} built & uploaded as a draft" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Nothing is live yet. Approve the **publish-to-chrome-web-store**" >> $GITHUB_STEP_SUMMARY
          echo "environment deployment on this run to make it public." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/changelog.md >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack on failure
        if: failure()
        uses: ./.github/actions/notify-slack-failure
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Job 2: the actual, irreversible "go live" call. Gated behind the
  # `publish-to-chrome-web-store` GitHub Environment — configure required
  # reviewers on that environment (Settings → Environments) and this job will
  # pause with a "Review deployments" prompt until someone approves it.
  publish:
    name: Publish to Chrome Web Store (requires approval)
    needs: build-and-upload
    runs-on: ubuntu-latest
    environment: publish-to-chrome-web-store
    permissions:
      contents: read
      actions: read   # needed by notify-slack-failure to look up the failed step

    steps:
      # Only needed so notify-slack-failure's composite action files are
      # present on the runner — everything else in this job is pure API calls.
      - name: Checkout (for the Slack notify action)
        uses: actions/checkout@v4

      - name: Get Chrome Web Store access token
        id: cws_token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to get access token: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Publish to Chrome Web Store
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ steps.cws_token.outputs.token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | jq -r '.status[0]')
          if [ "$STATUS" != "OK" ] && [ "$STATUS" != "PUBLISHED_WITH_FRICTION" ]; then
            echo "Publish failed with status: $STATUS"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### ✅ Extension v${{ needs.build-and-upload.outputs.new_version }} published live" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack on failure
        if: failure()
        uses: ./.github/actions/notify-slack-failure
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
