name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.anzeigenboost.de/api

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "▶ Deploying frontend…"
            cd /root/kleinanzeigen-boost
            git fetch origin main
            git reset --hard origin/main
            cd frontend
            npm ci
            npm run build
            echo "▶ Copying built files to nginx…"
            rm -rf /var/www/html/*
            cp -r dist/* /var/www/html/
            chmod -R 755 /var/www/html
            echo "✅ Frontend deployed."

      - name: Verify deployment
        run: |
          sleep 2
          if curl -fsS "https://anzeigenboost.de/" | grep -q "AnzeigenBoost"; then
            echo "✅ Frontend is live and responding correctly."
          else
            echo "❌ Frontend verification failed."
            exit 1
          fi
