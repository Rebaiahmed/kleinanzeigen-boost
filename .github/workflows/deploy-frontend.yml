name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read   # needed by notify-slack-failure to look up the failed step

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Note: the actual production build runs ON THE VPS in the deploy step below
      # (with VITE_API_URL passed inline). We don't build on the runner because
      # that artifact is never shipped — building here only caused confusion.

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "▶ Deploying frontend…"
            cd /root/kleinanzeigen-boost
            git fetch origin main || {
              echo "fetch failed — repairing refs and retrying"
              git update-ref -d refs/remotes/origin/main 2>/dev/null || true
              git remote prune origin 2>/dev/null || true
              git fetch origin main
            }
            git reset --hard origin/main
            cd frontend
            npm ci
            # IMPORTANT: this VPS build is the one that actually ships. It must
            # receive VITE_API_URL or Vite falls back to frontend/.env (localhost),
            # which breaks the live auth handshake (exchange-token hits localhost).
            VITE_API_URL=https://api.anzeigenboost.de/api npm run build
            echo "▶ Copying built files to nginx…"
            rm -rf /var/www/html/*
            cp -r dist/* /var/www/html/
            chmod -R 755 /var/www/html
            echo "✅ Frontend deployed."

      - name: Verify deployment
        run: |
          sleep 2
          if curl -fsS "https://anzeigenboost.de/" | grep -q "AnzeigenBoost"; then
            echo "✅ Frontend is live and responding correctly."
          else
            echo "❌ Frontend verification failed."
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure()
        uses: ./.github/actions/notify-slack-failure
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
