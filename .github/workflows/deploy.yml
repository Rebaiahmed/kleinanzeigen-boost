name: Production Monorepo Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  audit-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Validate Backend TypeScript
        run: cd backend && npm ci && npx tsc --noEmit

      - name: Validate Frontend TypeScript
        run: cd frontend && npm ci && npx tsc --noEmit

      - name: Validate Automation TypeScript
        run: cd automation && npm ci && npx tsc --noEmit

  deploy-services:
    needs: audit-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. Backend NestJS Build
      - name: Build NestJS Backend
        run: cd backend && npm ci && npm run build

      # 2. Automation Worker Build
      - name: Build Automation Worker
        run: cd automation && npm ci && npm run build

      # 3. Frontend Build & Deploy to Firebase Hosting
      - name: Build & Deploy Frontend
        run: |
          cd frontend
          npm ci && npm run build
          npx firebase-tools deploy --only hosting --project kleinanzeigen-app --token ${{ secrets.FIREBASE_TOKEN }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # 4. Build Chrome Extension
      - name: Build Chrome Extension
        run: cd extension && npm ci && npm run build
