version: '3.9'
services:
  backend:
    build: ./backend
    ports: ["3000:3000"]
    env_file: ./backend/.env
    volumes:
      - ./backend/src:/app/src
    networks: [anzeigenboost]
    depends_on: [automation]

  frontend:
    build: ./frontend
    ports: ["5173:80"]
    env_file: ./frontend/.env
    networks: [anzeigenboost]

  automation:
    build: ./automation
    # No external port mapping — only reachable from backend via the internal Docker network.
    # Expose port only in docker-compose.override.yml for local debugging if needed.
    expose: ["3001"]
    env_file: ./automation/.env
    networks: [anzeigenboost]

networks:
  anzeigenboost:
    driver: bridge
