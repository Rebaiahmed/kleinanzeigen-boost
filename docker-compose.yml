version: '3.9'
services:
  backend:
    build: ./backend
    ports: ["3000:3000"]
    env_file: ./backend/.env
    volumes:
      - ./backend/src:/app/src
    networks: [anzeigenboost]
    depends_on: [automation]

  frontend:
    build: ./frontend
    ports: ["5173:80"]
    env_file: ./frontend/.env
    networks: [anzeigenboost]

  automation:
    build: ./automation
    ports: ["3001:3001"]
    env_file: ./automation/.env
    networks: [anzeigenboost]
    # No external port exposure — only reachable from backend

networks:
  anzeigenboost:
    driver: bridge
