<svg viewBox="0 0 200 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AnzeigenBoost App Icon</title>
  <desc>Lime-green upward chevron on a white rounded square, optimized to stay legible at 16px.</desc>
  <!-- White rounded square background (fills ~94% of the canvas) -->
  <rect x="6" y="6" width="188" height="188" rx="40" fill="white" stroke="#A8C300" stroke-width="3"/>
  <!-- Upward chevron in lime green -->
  <g transform="translate(100,104)">
    <line x1="-48" y1="18" x2="0" y2="-32" stroke="#A8C300" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-32" x2="48" y2="18" stroke="#A8C300" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
