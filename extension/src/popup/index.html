<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AnzeigenBoost</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .logo {
      font-size: 24px;
    }
    h3 {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
    }
    .status-card {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .status-connected {
      background: #f0fdf4;
      border-left: 3px solid #22c55e;
    }
    .status-disconnected {
      background: #fef2f2;
      border-left: 3px solid #ef4444;
    }
    .status-text {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .status-detail {
      font-size: 12px;
      color: #6b7280;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    button:hover {
      background: #1d4ed8;
    }
    .button-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .button-secondary:hover {
      background: #e5e7eb;
    }
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">📦</span>
    <h3>AnzeigenBoost</h3>
  </div>
  
  <div class="status-card" id="statusCard">
    <div class="status-text" id="statusText">Prüfe Verbindung...</div>
    <div class="status-detail" id="statusDetail">Wird geladen</div>
  </div>
  
  <button id="openDashboardBtn">📊 Dashboard öffnen</button>
  <button id="reloadExtensionBtn" class="button-secondary">🔄 Extension neu laden</button>
  
  <div class="footer">
    Version 1.0.0
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
