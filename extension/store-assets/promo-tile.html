<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0}
  .tile{
    width:440px;height:280px;box-sizing:border-box;
    background:linear-gradient(135deg,#2f3a2a 0%,#3c4a33 55%,#46562f 100%);
    color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;justify-content:center;
    padding:34px 36px;position:relative;overflow:hidden;
  }
  .glow{position:absolute;right:-60px;top:-60px;width:240px;height:240px;
    background:radial-gradient(circle,rgba(170,200,40,.35),transparent 70%);}
  .brandrow{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .logo{width:54px;height:54px;border-radius:13px;background:#fff;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .logo svg{width:34px;height:34px}
  .name{font-size:25px;font-weight:800;letter-spacing:-.3px}
  .tag{font-size:21px;font-weight:700;line-height:1.25;margin:0 0 10px}
  .tag .hl{color:#c3dd3e}
  .sub{font-size:14px;font-weight:500;color:#d7e0cc;line-height:1.4}
</style>
</head>
<body>
  <div class="tile">
    <div class="glow"></div>
    <div class="brandrow">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#9bbb12" stroke-width="3.2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="5 15 12 8 19 15"></polyline>
        </svg>
      </div>
      <div class="name">AnzeigenBoost</div>
    </div>
    <p class="tag">Anzeigen mit <span class="hl">einem Klick</span><br>neu einstellen</p>
    <p class="sub">+ Anzeigen per Foto mit KI erstellen · Mehr Sichtbarkeit, weniger Aufwand.</p>
  </div>
</body>
</html>
